<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Player silhouette - jumping smash pose -->
  <g fill="#1a1a1a">
    <!-- Head -->
    <circle cx="55" cy="22" r="7"/>
    <!-- Body/torso - stretched upward -->
    <path d="M52 28 L48 50 L58 50 L60 28 Z"/>
    <!-- Raised arm with racket -->
    <path d="M58 30 L68 18 L72 14 L74 16 L70 20 L60 34 Z"/>
    <!-- Racket -->
    <ellipse cx="75" cy="11" rx="8" ry="6" fill="none" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(-30 75 11)"/>
    <line x1="72" y1="14" x2="75" y2="11" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Left arm (bent back) -->
    <path d="M52 32 L40 38 L36 44 L38 46 L42 40 L54 36 Z"/>
    <!-- Right leg (stretched down) -->
    <path d="M54 48 L60 66 L64 82 L68 84 L66 82 L62 66 L56 50 Z"/>
    <!-- Right foot -->
    <path d="M64 82 L70 84 L72 82 L68 80 Z"/>
    <!-- Left leg (bent back) -->
    <path d="M48 48 L42 60 L34 68 L32 74 L36 74 L38 68 L44 60 L50 50 Z"/>
    <!-- Left foot -->
    <path d="M32 74 L28 76 L30 78 L36 76 Z"/>
  </g>
  <!-- Shuttlecock above racket -->
  <g transform="translate(78, 2) scale(0.12)">
    <ellipse cx="0" cy="0" rx="30" ry="25" fill="#FFFFFF" stroke="#999" stroke-width="4"/>
    <path d="M-15 -8 L-25 -50 L0 -35 Z" fill="#F0F0F0" stroke="#CCC" stroke-width="2"/>
    <path d="M15 -8 L25 -50 L0 -35 Z" fill="#F0F0F0" stroke="#CCC" stroke-width="2"/>
    <path d="M0 -10 L0 -55 L-10 -40 Z" fill="#E8E8E8" stroke="#CCC" stroke-width="2"/>
    <path d="M0 -10 L0 -55 L10 -40 Z" fill="#E8E8E8" stroke="#CCC" stroke-width="2"/>
  </g>
</svg>