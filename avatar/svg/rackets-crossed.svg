<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left racket (pink/magenta) -->
  <g stroke="#CC44CC" fill="none" stroke-width="2.5" stroke-linecap="round">
    <!-- Handle -->
    <line x1="20" y1="85" x2="38" y2="50"/>
    <!-- Grip -->
    <rect x="17" y="82" width="8" height="12" rx="2" transform="rotate(-30 21 88)" fill="#CC44CC" opacity="0.3" stroke="#CC44CC" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="42" cy="38" rx="14" ry="18" transform="rotate(-15 42 38)"/>
    <!-- Strings -->
    <line x1="36" y1="25" x2="36" y2="50" stroke-width="0.8" opacity="0.5"/>
    <line x1="42" y1="20" x2="42" y2="55" stroke-width="0.8" opacity="0.5"/>
    <line x1="48" y1="24" x2="48" y2="52" stroke-width="0.8" opacity="0.5"/>
    <line x1="30" y1="33" x2="54" y2="30" stroke-width="0.8" opacity="0.5"/>
    <line x1="29" y1="40" x2="55" y2="37" stroke-width="0.8" opacity="0.5"/>
    <line x1="30" y1="47" x2="54" y2="44" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Right racket (blue) -->
  <g stroke="#4444CC" fill="none" stroke-width="2.5" stroke-linecap="round">
    <!-- Handle -->
    <line x1="80" y1="85" x2="62" y2="50"/>
    <!-- Grip -->
    <rect x="75" y="82" width="8" height="12" rx="2" transform="rotate(30 79 88)" fill="#4444CC" opacity="0.3" stroke="#4444CC" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="58" cy="38" rx="14" ry="18" transform="rotate(15 58 38)"/>
    <!-- Strings -->
    <line x1="52" y1="25" x2="52" y2="50" stroke-width="0.8" opacity="0.5"/>
    <line x1="58" y1="20" x2="58" y2="55" stroke-width="0.8" opacity="0.5"/>
    <line x1="64" y1="24" x2="64" y2="52" stroke-width="0.8" opacity="0.5"/>
    <line x1="46" y1="30" x2="70" y2="33" stroke-width="0.8" opacity="0.5"/>
    <line x1="45" y1="37" x2="71" y2="40" stroke-width="0.8" opacity="0.5"/>
    <line x1="46" y1="44" x2="70" y2="47" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Shuttlecock at top center -->
  <g transform="translate(50, 8)">
    <ellipse cx="0" cy="8" rx="4" ry="3.5" fill="#7744AA"/>
    <path d="M0 5 L-6 -6 L-1 0 Z" fill="#7744AA" opacity="0.9"/>
    <path d="M0 5 L6 -6 L1 0 Z" fill="#7744AA" opacity="0.9"/>
    <path d="M0 5 L-3 -8 L0 -1 Z" fill="#9966CC" opacity="0.8"/>
    <path d="M0 5 L3 -8 L0 -1 Z" fill="#9966CC" opacity="0.8"/>
  </g>
</svg>