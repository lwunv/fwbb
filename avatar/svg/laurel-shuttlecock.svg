<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left laurel branch -->
  <g fill="#1a2744">
    <ellipse cx="22" cy="30" rx="4" ry="8" transform="rotate(30 22 30)"/>
    <ellipse cx="18" cy="42" rx="4" ry="8" transform="rotate(20 18 42)"/>
    <ellipse cx="16" cy="55" rx="4" ry="8" transform="rotate(10 16 55)"/>
    <ellipse cx="18" cy="68" rx="4" ry="8" transform="rotate(-5 18 68)"/>
    <ellipse cx="24" cy="78" rx="4" ry="7" transform="rotate(-20 24 78)"/>
  </g>
  <!-- Right laurel branch -->
  <g fill="#1a2744">
    <ellipse cx="78" cy="30" rx="4" ry="8" transform="rotate(-30 78 30)"/>
    <ellipse cx="82" cy="42" rx="4" ry="8" transform="rotate(-20 82 42)"/>
    <ellipse cx="84" cy="55" rx="4" ry="8" transform="rotate(-10 84 55)"/>
    <ellipse cx="82" cy="68" rx="4" ry="8" transform="rotate(5 82 68)"/>
    <ellipse cx="76" cy="78" rx="4" ry="7" transform="rotate(20 76 78)"/>
  </g>
  <!-- Red accent leaves at top -->
  <ellipse cx="26" cy="22" rx="3.5" ry="7" transform="rotate(40 26 22)" fill="#CC3333"/>
  <ellipse cx="74" cy="22" rx="3.5" ry="7" transform="rotate(-40 74 22)" fill="#CC3333"/>
  <!-- Laurel stems -->
  <path d="M36 88 Q22 70, 26 20" fill="none" stroke="#1a2744" stroke-width="2"/>
  <path d="M64 88 Q78 70, 74 20" fill="none" stroke="#1a2744" stroke-width="2"/>
  <!-- Crossed stems at bottom -->
  <line x1="36" y1="88" x2="58" y2="94" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="88" x2="42" y2="94" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shuttlecock centered -->
  <g transform="translate(50, 50)">
    <!-- Cork -->
    <ellipse cx="0" cy="10" rx="6" ry="5" fill="#1a2744"/>
    <ellipse cx="0" cy="9" rx="4" ry="3.5" fill="#3a4764" opacity="0.5"/>
    <!-- Feathers -->
    <path d="M0 5 L-10 -18 L-3 -8 Z" fill="#1a2744"/>
    <path d="M0 5 L10 -18 L3 -8 Z" fill="#1a2744"/>
    <path d="M0 5 L-5 -20 L0 -10 Z" fill="#2a3754"/>
    <path d="M0 5 L5 -20 L0 -10 Z" fill="#2a3754"/>
    <!-- White highlights -->
    <path d="M-1 2 L-6 -14 L-1 -6 Z" fill="#FFFFFF" opacity="0.25"/>
    <path d="M1 2 L6 -14 L1 -6 Z" fill="#FFFFFF" opacity="0.15"/>
  </g>
</svg>