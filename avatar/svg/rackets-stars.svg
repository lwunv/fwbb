<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left racket -->
  <g stroke="#1a2744" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Handle -->
    <line x1="25" y1="90" x2="40" y2="55"/>
    <!-- Grip marks -->
    <line x1="27" y1="85" x2="30" y2="83" stroke-width="1.2" opacity="0.5"/>
    <line x1="29" y1="80" x2="32" y2="78" stroke-width="1.2" opacity="0.5"/>
    <!-- Head -->
    <ellipse cx="44" cy="40" rx="13" ry="17" transform="rotate(-12 44 40)"/>
    <!-- Strings -->
    <line x1="38" y1="28" x2="38" y2="52" stroke-width="0.7" opacity="0.4"/>
    <line x1="44" y1="23" x2="44" y2="57" stroke-width="0.7" opacity="0.4"/>
    <line x1="50" y1="27" x2="50" y2="53" stroke-width="0.7" opacity="0.4"/>
    <line x1="33" y1="35" x2="55" y2="33" stroke-width="0.7" opacity="0.4"/>
    <line x1="32" y1="43" x2="56" y2="41" stroke-width="0.7" opacity="0.4"/>
  </g>
  <!-- Right racket -->
  <g stroke="#1a2744" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Handle -->
    <line x1="75" y1="90" x2="60" y2="55"/>
    <!-- Grip marks -->
    <line x1="73" y1="85" x2="70" y2="83" stroke-width="1.2" opacity="0.5"/>
    <line x1="71" y1="80" x2="68" y2="78" stroke-width="1.2" opacity="0.5"/>
    <!-- Head -->
    <ellipse cx="56" cy="40" rx="13" ry="17" transform="rotate(12 56 40)"/>
    <!-- Strings -->
    <line x1="50" y1="28" x2="50" y2="52" stroke-width="0.7" opacity="0.4"/>
    <line x1="56" y1="23" x2="56" y2="57" stroke-width="0.7" opacity="0.4"/>
    <line x1="62" y1="27" x2="62" y2="53" stroke-width="0.7" opacity="0.4"/>
    <line x1="45" y1="33" x2="67" y2="35" stroke-width="0.7" opacity="0.4"/>
    <line x1="44" y1="41" x2="68" y2="43" stroke-width="0.7" opacity="0.4"/>
  </g>
  <!-- Shuttlecock at top -->
  <g transform="translate(50, 8)">
    <ellipse cx="0" cy="7" rx="4" ry="3" fill="#1a2744"/>
    <path d="M0 4 L-5 -5 L0 0 Z" fill="#1a2744"/>
    <path d="M0 4 L5 -5 L0 0 Z" fill="#1a2744"/>
    <path d="M0 4 L-2 -7 L0 -1 Z" fill="#2a3764"/>
    <path d="M0 4 L2 -7 L0 -1 Z" fill="#2a3764"/>
  </g>
  <!-- Three red stars between handles -->
  <g fill="#CC3333">
    <!-- Star 1 (left) -->
    <polygon points="40,72 41.5,68 43,72 39,69.5 44,69.5" stroke="#CC3333" stroke-width="0.5"/>
    <!-- Star 2 (center) -->
    <polygon points="50,68 52,63 54,68 48.5,65 55.5,65" stroke="#CC3333" stroke-width="0.5"/>
    <!-- Star 3 (right) -->
    <polygon points="60,72 61.5,68 63,72 59,69.5 64,69.5" stroke="#CC3333" stroke-width="0.5"/>
  </g>
  <!-- Blue arc below -->
  <path d="M30 85 Q50 78, 70 85" fill="none" stroke="#4477CC" stroke-width="2.5" stroke-linecap="round"/>
</svg>