<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Apacs stylized "a" icon - bold rounded lowercase a -->
  <!-- The right vertical bar -->
  <rect x="64" y="4" width="18" height="92" rx="2" fill="#1a1a1a"/>
  <!-- The round C-shaped body -->
  <path d="
    M 50 4
    C 22 4, 4 24, 4 50
    C 4 76, 22 96, 50 96
    C 60 96, 66 94, 68 92
    L 68 78
    C 64 80, 58 82, 50 82
    C 30 82, 18 68, 18 50
    C 18 32, 30 18, 50 18
    C 58 18, 64 20, 68 22
    L 68 8
    C 66 6, 60 4, 50 4
    Z
  " fill="#1a1a1a"/>
  <!-- Inner counter (white hole) of the a -->
  <path d="
    M 50 36
    C 40 36, 32 42, 32 52
    C 32 62, 40 68, 50 68
    L 64 68
    L 64 36
    Z
  " fill="white"/>
  <!-- The squared flat top connecting to the vertical bar -->
  <rect x="52" y="4" width="30" height="18" rx="2" fill="#1a1a1a"/>
</svg>