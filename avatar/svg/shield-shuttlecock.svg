<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield shape -->
  <path d="M50 5 L88 18 L88 55 Q88 78, 50 95 Q12 78, 12 55 L12 18 Z" fill="#1a2744" stroke="#CC3333" stroke-width="3"/>
  <!-- Grid pattern on shield -->
  <g stroke="#2a3754" stroke-width="0.6" opacity="0.5">
    <line x1="20" y1="20" x2="20" y2="80"/>
    <line x1="30" y1="15" x2="30" y2="88"/>
    <line x1="40" y1="12" x2="40" y2="92"/>
    <line x1="50" y1="10" x2="50" y2="95"/>
    <line x1="60" y1="12" x2="60" y2="92"/>
    <line x1="70" y1="15" x2="70" y2="88"/>
    <line x1="80" y1="20" x2="80" y2="80"/>
    <line x1="15" y1="30" x2="85" y2="30"/>
    <line x1="14" y1="42" x2="86" y2="42"/>
    <line x1="14" y1="54" x2="86" y2="54"/>
    <line x1="16" y1="66" x2="84" y2="66"/>
    <line x1="22" y1="78" x2="78" y2="78"/>
  </g>
  <!-- Laurel wreath inside shield (white/silver) -->
  <g fill="none" stroke="#C0C8D4" stroke-width="1.2" opacity="0.7">
    <!-- Left laurel -->
    <ellipse cx="34" cy="40" rx="3" ry="6" transform="rotate(25 34 40)"/>
    <ellipse cx="32" cy="50" rx="3" ry="6" transform="rotate(15 32 50)"/>
    <ellipse cx="33" cy="60" rx="3" ry="6" transform="rotate(-5 33 60)"/>
    <ellipse cx="37" cy="68" rx="3" ry="5" transform="rotate(-20 37 68)"/>
    <!-- Right laurel -->
    <ellipse cx="66" cy="40" rx="3" ry="6" transform="rotate(-25 66 40)"/>
    <ellipse cx="68" cy="50" rx="3" ry="6" transform="rotate(-15 68 50)"/>
    <ellipse cx="67" cy="60" rx="3" ry="6" transform="rotate(5 67 60)"/>
    <ellipse cx="63" cy="68" rx="3" ry="5" transform="rotate(20 63 68)"/>
  </g>
  <!-- Shuttlecock centered (white/silver) -->
  <g transform="translate(50, 48)" fill="#D8DEE8" stroke="#B0B8C8" stroke-width="0.6">
    <ellipse cx="0" cy="8" rx="5" ry="4"/>
    <path d="M0 4 L-8 -14 L-2 -5 Z"/>
    <path d="M0 4 L8 -14 L2 -5 Z"/>
    <path d="M0 4 L-4 -16 L0 -7 Z" fill="#ECEFF4"/>
    <path d="M0 4 L4 -16 L0 -7 Z" fill="#ECEFF4"/>
  </g>
  <!-- Bright highlight -->
  <path d="M50 36 L46 32 L50 28 L54 32 Z" fill="#FFFFFF" opacity="0.15"/>
</svg>