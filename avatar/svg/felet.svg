<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Felet stylized F logo with swooping oval -->
  <!-- Vertical bar of F -->
  <rect x="18" y="10" width="14" height="80" fill="#6A3B9E"/>
  <!-- Top horizontal bar with triangular point -->
  <polygon points="18,10 72,10 72,22 18,22" fill="#6A3B9E"/>
  <!-- Triangular top-right element (pointed upward) -->
  <polygon points="72,10 72,22 82,4" fill="#6A3B9E"/>
  <!-- Middle horizontal bar of F -->
  <rect x="18" y="42" width="40" height="11" fill="#6A3B9E"/>
  <!-- Large swooping oval stroke through the F -->
  <ellipse cx="54" cy="56" rx="40" ry="24" fill="none" stroke="#6A3B9E" stroke-width="7" transform="rotate(-12, 54, 56)"/>
</svg>