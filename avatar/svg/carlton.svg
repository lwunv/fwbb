<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Carlton shuttlecock: 3 elongated triangles fanning out from a center point, pointing downward -->
  <g transform="translate(50, 55)">
    <!-- Center triangle (straight down) -->
    <polygon points="0,-42 -8,10 8,10" fill="#E8B100"/>
    <!-- Left triangle (fanning left) -->
    <polygon points="0,-2 -28,-44 -12,-44" fill="#E8B100" transform="rotate(-20)"/>
    <!-- Right triangle (fanning right) -->
    <polygon points="0,-2 12,-44 28,-44" fill="#E8B100" transform="rotate(20)"/>
    <!-- Cork base (small semi-circle at bottom) -->
    <ellipse cx="0" cy="14" rx="10" ry="6" fill="#E8B100"/>
  </g>
</svg>
