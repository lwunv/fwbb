<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- VNB logo - white on dark background -->
  <rect x="0" y="0" width="100" height="100" rx="10" fill="#1a1a1a"/>
  <!-- Abstract icon: cross/plus shape on left + swoosh to right -->
  <!-- Top-left block -->
  <rect x="10" y="10" width="18" height="20" rx="3" fill="white"/>
  <!-- Bottom-left block -->
  <rect x="10" y="34" width="18" height="20" rx="3" fill="white"/>
  <!-- Top-right block -->
  <rect x="32" y="10" width="18" height="20" rx="3" fill="white"/>
  <!-- Swoosh extending from the blocks to the right -->
  <path d="
    M 32 34
    C 36 34, 48 32, 60 26
    C 72 20, 82 16, 88 18
    C 90 20, 88 24, 82 28
    C 72 36, 56 42, 40 46
    C 32 48, 28 50, 28 54
    L 10 54
    L 10 34
    Z
  " fill="white"/>
  <!-- VNB text at bottom -->
  <text x="58" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="3">VNB</text>
</svg>