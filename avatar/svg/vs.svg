<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- VS (Venson) VSE logo on dark background -->
  <rect x="0" y="0" width="100" height="100" rx="10" fill="#1a1a1a"/>
  <!-- V - diagonal strokes -->
  <polygon points="8,26 20,26 36,66 40,56 28,26 36,26 40,40" fill="#B8860B"/>
  <path d="M 8,26 L 18,26 L 38,72 L 30,72 Z" fill="#B8860B"/>
  <!-- Diagonal connecting V to S -->
  <path d="M 28,26 L 38,26 L 56,72 L 48,72 Z" fill="#B8860B"/>
  <!-- S curve merged with speed lines forming E -->
  <!-- Top speed line -->
  <rect x="44" y="26" width="48" height="7" rx="2" fill="#B8860B"/>
  <!-- Middle speed line -->
  <rect x="38" y="44" width="48" height="7" rx="2" fill="#B8860B"/>
  <!-- Bottom speed line -->
  <rect x="44" y="62" width="48" height="7" rx="2" fill="#B8860B"/>
  <!-- S curve connecting the lines -->
  <path d="
    M 52 26
    C 44 26, 38 32, 38 38
    C 38 42, 40 44, 44 44
  " fill="none" stroke="#B8860B" stroke-width="7" stroke-linecap="round"/>
  <path d="
    M 44 51
    C 52 51, 58 56, 58 62
    C 58 66, 54 69, 48 69
  " fill="none" stroke="#B8860B" stroke-width="7" stroke-linecap="round"/>
</svg>