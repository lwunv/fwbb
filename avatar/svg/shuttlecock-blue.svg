<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#88DDFF"/>
      <stop offset="50%" stop-color="#2288DD"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66CCFF"/>
      <stop offset="100%" stop-color="#0055BB"/>
    </linearGradient>
  </defs>
  <!-- Geometric feather panels -->
  <polygon points="50,8 30,50 38,52" fill="url(#blueGrad)" opacity="0.9"/>
  <polygon points="50,8 70,50 62,52" fill="url(#blueGrad)" opacity="0.9"/>
  <polygon points="50,8 34,52 42,54" fill="url(#blueGrad2)" opacity="0.85"/>
  <polygon points="50,8 66,52 58,54" fill="url(#blueGrad2)" opacity="0.85"/>
  <polygon points="50,8 40,54 50,52" fill="url(#blueGrad)" opacity="0.8"/>
  <polygon points="50,8 60,54 50,52" fill="url(#blueGrad)" opacity="0.8"/>
  <!-- Geometric edge highlights -->
  <polygon points="50,10 32,48 35,49" fill="#AAEEFF" opacity="0.3"/>
  <polygon points="50,10 68,48 65,49" fill="#AAEEFF" opacity="0.2"/>
  <!-- Band -->
  <rect x="32" y="54" width="36" height="5" rx="2.5" fill="#0044CC"/>
  <rect x="34" y="55" width="32" height="2.5" rx="1" fill="#2266DD" opacity="0.6"/>
  <!-- Cork base - geometric -->
  <polygon points="36,59 50,82 64,59" fill="#1155AA"/>
  <polygon points="38,60 50,78 62,60" fill="#2266CC" opacity="0.7"/>
  <polygon points="42,62 50,74 58,62" fill="#3377DD" opacity="0.5"/>
  <!-- Subtle light reflection -->
  <polygon points="44,62 50,72 52,62" fill="#88CCFF" opacity="0.2"/>
</svg>