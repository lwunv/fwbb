<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ashaway: Letter K formed by horizontal red stripes -->
  <defs>
    <clipPath id="k-shape">
      <!-- Vertical stroke of K -->
      <rect x="20" y="12" width="14" height="76"/>
      <!-- Upper diagonal of K -->
      <polygon points="34,48 34,40 72,12 72,24"/>
      <polygon points="34,44 34,36 62,16 62,28"/>
      <!-- Lower diagonal of K -->
      <polygon points="34,52 34,60 72,88 72,76"/>
      <polygon points="34,56 34,64 62,84 62,72"/>
      <!-- Fill in the K more solidly -->
      <polygon points="34,46 72,12 72,20 34,50"/>
      <polygon points="34,50 72,80 72,88 34,54"/>
    </clipPath>
  </defs>
  <!-- Horizontal stripes clipped to K shape -->
  <g clip-path="url(#k-shape)">
    <rect x="15" y="12" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="20" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="28" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="36" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="44" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="52" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="60" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="68" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="76" width="62" height="5" fill="#E31B23"/>
    <rect x="15" y="84" width="62" height="4" fill="#E31B23"/>
  </g>
</svg>
