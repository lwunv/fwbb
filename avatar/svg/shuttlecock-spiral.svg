<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shuttlecock at top -->
  <g transform="translate(25, 8)">
    <!-- Cork base -->
    <ellipse cx="0" cy="12" rx="6" ry="5" fill="#E8E0D8" stroke="#BFAE9F" stroke-width="1"/>
    <!-- Feathers -->
    <path d="M-6 8 L-10 -8 L0 -2 Z" fill="#F5F0EB" stroke="#D5CCC3" stroke-width="0.6"/>
    <path d="M6 8 L10 -8 L0 -2 Z" fill="#F5F0EB" stroke="#D5CCC3" stroke-width="0.6"/>
    <path d="M-3 7 L-5 -10 L0 -3 Z" fill="#EDE8E3" stroke="#D5CCC3" stroke-width="0.6"/>
    <path d="M3 7 L5 -10 L0 -3 Z" fill="#EDE8E3" stroke="#D5CCC3" stroke-width="0.6"/>
    <!-- Red band -->
    <rect x="-6" y="6" width="12" height="3" rx="1" fill="#E31B23" opacity="0.8"/>
  </g>
  <!-- Spiral trail - 1.5 loops from upper-left to lower-right -->
  <path d="M25 22
    C 10 30, 15 50, 35 45
    C 55 40, 65 55, 50 65
    C 35 75, 45 88, 65 82
    C 78 78, 85 88, 82 95"
    fill="none" stroke="#E31B23" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <path d="M25 22
    C 10 30, 15 50, 35 45
    C 55 40, 65 55, 50 65
    C 35 75, 45 88, 65 82
    C 78 78, 85 88, 82 95"
    fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" opacity="0.5" stroke-dasharray="2 4"/>
  <!-- Fading dots along trail end -->
  <circle cx="82" cy="95" r="2" fill="#999" opacity="0.4"/>
  <circle cx="78" cy="92" r="1.5" fill="#E31B23" opacity="0.3"/>
</svg>